name: Build Client

on:
  push:
    branches: [ main, master ]
    paths:
      - 'now-playing-service-go/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'now-playing-service-go/**'

defaults:
  run:
    working-directory: now-playing-service-go

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          check-latest: true
          cache-dependency-path: now-playing-service-go/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          check-latest: true
          cache-dependency-path: now-playing-service-go/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bin
          VERSION=$(git describe --tags --always 2>/dev/null || echo "unknown")
          BUILD_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
          CGO_ENABLED=0 go build -trimpath -ldflags "-X github.com/newton-miku/now-playing-service-go/tools.Version=${VERSION} -X github.com/newton-miku/now-playing-service-go/tools.BuildTime=${BUILD_TIME} -w -s" -o bin/now-playing-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: now-playing-${{ matrix.goos }}-${{ matrix.goarch }}
          path: now-playing-service-go/bin/now-playing-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
