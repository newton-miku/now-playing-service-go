name: Build Client

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    strategy:
      matrix:
        goarch: [amd64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Set up MinGW-w64
        uses: egor-tensin/setup-mingw@v3
        with:
          platform: x64

      - name: Verify GCC
        shell: cmd
        run: |
          gcc --version

      - name: Install dependencies
        run: go mod download

      - name: Build using batch script
        shell: cmd
        run: |
          call build.bat ${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: now-playing-windows-${{ matrix.goarch }}
          path: bin/now-playing-windows-${{ matrix.goarch }}.exe
