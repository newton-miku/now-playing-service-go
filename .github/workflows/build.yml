name: Build Client

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          check-latest: true

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          check-latest: true

      - name: Install dependencies
        run: go mod download

      - name: Build
        run: make linux-${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: now-playing-linux-${{ matrix.goarch }}
          path: bin/now-playing-linux-${{ matrix.goarch }}

  build-darwin:
    name: Build macOS
    runs-on: macos-latest
    needs: test
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          check-latest: true

      - name: Install dependencies
        run: go mod download

      - name: Build
        run: make darwin-${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: now-playing-darwin-${{ matrix.goarch }}
          path: bin/now-playing-darwin-${{ matrix.goarch }}

  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goarch: [386, amd64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          check-latest: true

      - name: Install MinGW-w64 and 7zip
        run: sudo apt-get update && sudo apt-get install -y mingw-w64 p7zip-full

      - name: Install dependencies
        run: go mod download

      - name: Build
        run: make windows-${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: now-playing-windows-${{ matrix.goarch }}
          path: bin/now-playing-windows-${{ matrix.goarch }}.exe

  build-releases:
    name: Build Release Packages
    runs-on: ubuntu-latest
    needs: [build-linux, build-darwin, build-windows]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          check-latest: true

      - name: Install MinGW-w64 and 7zip
        run: sudo apt-get update && sudo apt-get install -y mingw-w64 p7zip-full

      - name: Install dependencies
        run: go mod download

      - name: Build all release packages
        run: make releases

      - name: Upload release packages
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: |
            bin/*.tar.gz
            bin/*.zip
