name: Release Client

on:
  push:
    tags:
      - 'client-v*'
      - 'v*'

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    strategy:
      matrix:
        goarch: [amd64]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          check-latest: true

      - name: Install MinGW-w64
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64

      - name: Install dependencies
        run: go mod download

      - name: Build
        shell: bash
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "unknown")
          BUILD_TIME=$(TZ=UTC-8 date +'%Y-%m-%d %H:%M:%S')
          export GOOS=windows
          export GOARCH=${{ matrix.goarch }}
          export CGO_ENABLED=1
          export CC=x86_64-w64-mingw32-gcc
          export CXX=x86_64-w64-mingw32-g++
          LDFLAGS="-X \"github.com/newton-miku/now-playing-service-go/tools.Version=${VERSION}\" -X \"github.com/newton-miku/now-playing-service-go/tools.BuildTime=${BUILD_TIME}\" -w -s -H=windowsgui"
          go build -trimpath -ldflags "${LDFLAGS}" -o bin/now-playing-windows-${{ matrix.goarch }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.goarch }}
          path: bin/now-playing-windows-${{ matrix.goarch }}.exe

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-windows
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin/

      - name: Create zip packages
        run: |
          sudo apt-get update && sudo apt-get install -y p7zip-full
          VERSION=$(git describe --tags --always)
          mkdir -p release

          # Move and zip Windows amd64
          if [ -f bin/windows-amd64/now-playing-windows-amd64.exe ]; then
            mkdir -p release/now-playing-windows-amd64
            mv bin/windows-amd64/now-playing-windows-amd64.exe release/now-playing-windows-amd64/
            # Copy config/web/ico if they exist
            cp -r config release/now-playing-windows-amd64/ 2>/dev/null || true
            cp -r web release/now-playing-windows-amd64/ 2>/dev/null || true
            cp -r ico release/now-playing-windows-amd64/ 2>/dev/null || true
            cd release && 7z a -tzip ../bin/now-playing-windows-amd64-${VERSION}.zip now-playing-windows-amd64 && cd ..
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: bin/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-pre') || contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
