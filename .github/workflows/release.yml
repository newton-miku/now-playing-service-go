name: Release Client

on:
  push:
    tags:
      - 'client-v*'
      - 'v*'

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    strategy:
      matrix:
        goarch: [amd64]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Set up MinGW-w64
        uses: egor-tensin/setup-mingw@v3
        with:
          platform: x64

      - name: Verify GCC
        shell: cmd
        run: |
          gcc --version

      - name: Install dependencies
        run: go mod download

      - name: Build and package using batch script
        shell: cmd
        run: |
          call build.bat ${{ matrix.goarch }} --package

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-${{ matrix.goarch }}
          path: bin/now-playing-windows-${{ matrix.goarch }}.exe

      - name: Upload zip package
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip-${{ matrix.goarch }}
          path: bin/now-playing-windows-${{ matrix.goarch }}-*.zip

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-windows
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display structure of downloaded files
        run: ls -R artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-zip-*/now-playing-windows-*.zip
            artifacts/windows-exe-*/now-playing-windows-*.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-pre') || contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
